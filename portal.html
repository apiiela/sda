<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const statusMessage = document.getElementById('statusMessage');

            // --- Define Valid Logins ---
            const validLogins = {
                'izzi': { password: 'Trenchbull1', role: 'admin' },
                'tayla': { password: 'Newt2026', role: 'admin' },
                'hayley': { password: 'Miracle3', role: 'admin' },
                'jamie': { password: 'Revolting4', role: 'admin' },
                'billy': { password: 'Admin', role: 'admin' },
                'teststudent': { password: '2026', role: 'viewer' } // <-- Added new login
            };
            // ---------------------------

            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const usernameInput = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const usernameKey = usernameInput.toLowerCase(); // Key for matching

                    // 1. Check if username exists
                    if (validLogins.hasOwnProperty(usernameKey)) {
                        const userLogin = validLogins[usernameKey];

                        // 2. Check if password matches
                        if (userLogin.password === password) {
                            // --- SUCCESS ---
                            statusMessage.textContent = 'Login successful! Redirecting...';
                            statusMessage.className = 'text-green-400 text-sm text-center';
                            
                            // 3. Save the user's role AND username to session storage
                            sessionStorage.setItem('userRole', userLogin.role);
                            sessionStorage.setItem('username', usernameInput); // Save the original-case username
                            
                            // 4. Redirect to the portal
                            setTimeout(() => {
                                window.location.href = 'portal-content.html';
                            }, 1000); // 1-second delay

                        } else {
                            // --- FAILED: Wrong Password ---
                            statusMessage.textContent = 'Invalid username or password.';
                            statusMessage.className = 'text-red-400 text-sm text-center';
                        }
                    } else {
                        // --- FAILED: Wrong Username ---
                        statusMessage.textContent = 'Invalid username or password.';
                        statusMessage.className = 'text-red-400 text-sm text-center';
                    }
                });
            }
        });
    </script>
</head>
<body class="bg-black text-slate-200 antialiased min-h-screen flex items-center justify-center p-6">

    <main class="w-full max-w-md">
        <!-- Logo Header -->
        <a href="index.html" class="flex justify-center items-center space-x-3 mb-8">
            <img src="https://raw.githubusercontent.com/apiiela/sdaproductionswa/main/sdalogo.jpeg" 
                 alt="SDA Logo" 
                 class="h-12 w-12 object-contain"
                 onerror="this.src='https://placehold.co/100x100/000000/white?text=SDA'; this.onerror=null;">
            <span class="text-2xl font-bold text-slate-100">SDA Portal</span>
        </a>

        <!-- Login Form -->
        <form id="loginForm" class="bg-gray-900 border border-slate-800 shadow-2xl rounded-lg p-8 space-y-6">
            
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300">Username</label>
                <input type="text" id="username" required 
                       class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm text-slate-100 py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                <input type="password" id="password" required 
                       class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm text-slate-100 py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Status Message Area -->
            <div id="statusMessage" class="text-sm text-center" role="alert">
                <!-- Messages (e.g., 'Invalid password') will appear here -->
            </div>
            
            <button type="submit" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-black focus:ring-indigo-500 transition-colors duration-200">
                Sign In
            </button>
        </form>
    </main>

</body>
</html>
