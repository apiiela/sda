<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SDA Productions WA</title>
<meta name="description" content="SDA Productions WA is a premier youth theatre group bringing spectacular, high-quality productions like Legally Blonde JR and Shrek Kids to the stage.">
<meta name="keywords" content="theatre groups, youth theatre, Legally Blonde JR, Shrek Kids, SDA Productions WA, Western Australia, local talent">

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<script src="https://cdn.tailwindcss.com"></script>
<style>
html { scroll-behavior: smooth; }
.btn { transition: .3s ease; }
.btn:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 10px 25px #0008; }

/* The front image handles the fading transition */
#hero-front { transition: opacity 1.5s ease-in-out; }
</style>
</head>

<body class="text-slate-200 bg-black">

<div class="fixed inset-0 w-full h-full z-0 bg-black">
    <img id="hero-back" class="absolute inset-0 w-full h-full object-cover" src="" alt="">
    
    <img id="hero-front" class="absolute inset-0 w-full h-full object-cover" src="homeimages/486035663_1855750601903652_2252793329146107875_n.jpg" alt="SDA Productions WA Stage Performance">
    
    <div class="absolute inset-0 bg-black/60 z-10"></div>
</div>

<header class="fixed top-0 left-0 w-full z-40 bg-black/50 backdrop-blur-sm">
<nav class="container mx-auto px-6 py-4 flex justify-between items-center">
<a class="font-bold text-white text-xl">SDA Productions WA</a>
<div class="space-x-6">
<a href="#shows" class="hover:text-indigo-400 transition-colors">Shows</a>
</div>
</nav>
</header>

<main class="relative z-20 w-full">
    
    <section class="h-screen w-full flex items-center justify-center">
        <div class="text-center container mx-auto px-6 pt-20">
            <h1 class="text-5xl font-bold text-white drop-shadow-lg">Welcome to SDA Productions WA</h1>
            <p class="my-8 text-lg text-gray-200 max-w-2xl mx-auto">One of the region's top theatre groups, nurturing local talent and bringing spectacular, high-quality youth productions to the stage.</p>
            <a href="#shows" class="btn inline-block bg-indigo-600 px-8 py-3 rounded-lg font-bold text-white shadow-lg">Explore Productions</a>
        </div>
    </section>

    <section id="shows" class="py-24 min-h-screen flex items-center">
        <div class="container mx-auto px-6">
            <h2 class="text-4xl text-center font-bold mb-12 drop-shadow-lg">Our Productions</h2>

            <div class="grid md:grid-cols-2 gap-10">
                <div class="text-center">
                    <div class="overflow-hidden rounded-xl bg-slate-900 shadow-2xl">
                        <img src="LegallyBlonde.jpg" alt="Legally Blonde JR - SDA Productions WA" class="w-full h-auto md:h-96 md:w-full md:object-cover object-center">
                    </div>
                    <a href="https://www.sdaproductionswa.com.au/legallyblonde" class="btn relative z-30 inline-block mt-6 bg-indigo-600 px-8 py-3 rounded-lg font-bold text-white shadow-lg">
                        Learn More
                    </a>
                </div>

                <div class="text-center">
                    <div class="overflow-hidden rounded-xl bg-slate-900 shadow-2xl">
                        <img src="ShrekKids.jpg" alt="Shrek Kids - SDA Productions WA" class="w-full h-auto md:h-96 md:w-full md:object-cover object-center">
                    </div>
                    <a href="https://www.sdaproductionswa.com.au/shrek" class="btn relative z-30 inline-block mt-6 bg-indigo-600 px-8 py-3 rounded-lg font-bold text-white shadow-lg">
                        Learn More
                    </a>
                </div>
            </div>
        </div>
    </section>
    
</main>

<script>
const imgs = [
'486035663_1855750601903652_2252793329146107875_n.jpg',
'486090259_1855750548570324_1518266976028074513_n.jpg',
'486111428_1855750598570319_8565482492485227311_n.jpg',
'486259208_1855750208570358_3613785565258713483_n.jpg',
'622249808_10164599700326255_7894434441473250354_n.jpg',
'HSMJR2026(19-07-2026)-15 (1).jpg',
'HSMJR2026(19-07-2026)-17 (1).jpg',
'HSMJR2026(19-07-2026)-2 (1).jpg',
'HSMJR2026(19-07-2026)-20 (1).jpg',
'HSMJR2026(19-07-2026)-41 (1).jpg',
'HSMJR2026(19-07-2026)-63 (1).jpg',
'HSMJR2026(19-07-2026)-66 (1).jpg',
'HSMJR2026(19-07-2026)-9 (1).jpg'
];

function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

shuffle(imgs);

let i = 0;
const heroFront = document.getElementById('hero-front');
const heroBack = document.getElementById('hero-back');

// Helper function to keep that specific image cropped at 25% height
function updateCrop(element, filename){
    if(filename.includes('486111428')){
        element.style.objectPosition = 'center 25%';
    } else {
        element.style.objectPosition = 'center center';
    }
}

updateCrop(heroFront, heroFront.src);

setInterval(() => {
    i++;
    if(i >= imgs.length){
        shuffle(imgs);
        i = 0;
    }

    const nextImageSrc = 'homeimages/' + imgs[i];

    // 1. Put the new image on the BACK layer
    heroBack.src = nextImageSrc;
    updateCrop(heroBack, imgs[i]);

    // 2. Wait for the back image to fully download
    heroBack.onload = () => {
        
        // 3. Smoothly fade out the front layer
        heroFront.style.opacity = 0;

        // 4. Once the 1.5s fade finishes, reset the layers for the next cycle
        setTimeout(() => {
            // Temporarily turn off the transition so we can snap the front layer back to full opacity instantly
            heroFront.style.transition = 'none'; 
            heroFront.src = nextImageSrc;
            updateCrop(heroFront, imgs[i]);
            heroFront.style.opacity = 1;
            
            // Turn the transition back on for the next fade
            setTimeout(() => {
                heroFront.style.transition = 'opacity 1.5s ease-in-out';
            }, 50);
            
        }, 1500); 
    };

}, 6000);
</script>
</body>
</html>
