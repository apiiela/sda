<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Portal - Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Simple pulse animation for new posts */
        @keyframes pulseIn {
            0% { transform: scale(0.95); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .new-post-animation {
            animation: pulseIn 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-black text-slate-200 antialiased min-h-screen">

    <!-- --- Gatekeeper Script --- -->
    <script>
        const userRole = sessionStorage.getItem('userRole');
        const username = sessionStorage.getItem('username');
        
        // ** FIX for "Welcome null" **
        // Check for BOTH role and username. If either is missing, log out.
        if (!userRole || !username) {
            // Clear any partial session data
            sessionStorage.removeItem('userRole');
            sessionStorage.removeItem('username');
            // Redirect to login
            window.location.replace('portal.html');
        }
    </script>
    <!-- ----------------------- -->

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, getDoc, addDoc, setDoc, updateDoc, deleteDoc, 
            onSnapshot, collection, query, serverTimestamp, increment, deleteField,
            arrayUnion, arrayRemove // <-- IMPORTED NEW FUNCTIONS
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        // We no longer need the 'firebase/storage' imports
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // --- Your Firebase Config ---
        const firebaseConfig = {
          apiKey: "AIzaSyCSNoTcrBdewkCjOdGoubaKkAo8ZYvUYj0",
          authDomain: "sdaproductions-7f04d.firebaseapp.com",
          projectId: "sdaproductions-7f04d",
          storageBucket: "sdaproductions-7f04d.appspot.com", 
          messagingSenderId: "372864946667",
          appId: "1:372864946667:web:ff348922a14a2a905009ae",
          measurementId: "G-54XVLP85NJ"
        };
        // -----------------------------

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        // We no longer need to initialize storage
        const analytics = getAnalytics(app);

        // --- Global Variables ---
        const userRole = sessionStorage.getItem('userRole');
        const username = sessionStorage.getItem('username'); // This is our UNIQUE ID (e.g., "Billy", "Izzi")
        let currentUserId = null; // This is the SHARED anonymous Firebase ID
        
        // --- UI Elements ---
        const welcomeMessage = document.getElementById('welcomeMessage');
        const adminControls = document.getElementById('adminControls');
        const postForm = document.getElementById('postForm');
        const postContent = document.getElementById('postContent');
        const postLink = document.getElementById('postLink'); // Changed from postFile
        // uploadProgress is no longer needed
        const postList = document.getElementById('postList');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusMessage = document.getElementById('statusMessage');

        // --- App Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Set Welcome Message & Admin UI
            if (welcomeMessage) {
                welcomeMessage.textContent = `Welcome, ${username}!`;
            }
            if (adminControls && userRole === 'admin') {
                adminControls.classList.remove('hidden');
            }

            // 2. Authenticate with Firebase
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    // User is signed in.
                    console.log('Firebase auth successful, user:', user.uid);
                    currentUserId = user.uid; // <-- This is our "key" to the database
                    // 3. Load forum posts
                    loadPosts();
                } else {
                    // User is signed out. Try to sign in.
                    console.log('No user signed in, attempting anonymous auth...');
                    try {
                        const userCredential = await signInAnonymously(auth);
                        currentUserId = userCredential.user.uid; // <-- Store the key
                        console.log('Anonymous sign-in successful:', currentUserId);
                        // 3. Load forum posts
                        loadPosts();
                    } catch (error) {
                        console.error('Firebase sign-in error:', error);
                        statusMessage.textContent = 'Error connecting to portal. Please try again.';
                        statusMessage.classList.remove('hidden');
                    }
                }
            });

            // 4. Handle Admin Post Form Submission
            if (postForm) {
                postForm.addEventListener('submit', handlePostSubmit);
            }
        });

        // --- Google Drive Embed Helper Functions ---

        /**
         * Extracts the Google Drive File ID from a shareable link.
         */
        function getDriveFileId(url) {
            if (!url || typeof url !== 'string') return null;

            // Pattern for standard /file/d/ID/view links
            let match = url.match(/file\/d\/([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return match[1];
            }

            // Pattern for old /open?id=ID links
            match = url.match(/id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return match[1];
            }

            return null;
        }

        /**
         * Generates the correct HTML for media, document, or a generic download link.
         */
        function generateEmbedHTML(fileURL) {
            const fileId = getDriveFileId(fileURL);
            if (!fileId) return ''; // Not a recognized Drive link

            const lowerURL = fileURL.toLowerCase();
            const embedUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
            const viewUrl = `https://drive.google.com/uc?export=view&id=${fileId}`; // For images
            
            // Explicit checks for file types
            const isImage = lowerURL.endsWith('.png') || lowerURL.endsWith('.jpg') || lowerURL.endsWith('.jpeg') || lowerURL.endsWith('.gif');
            const isAudio = lowerURL.endsWith('.mp3') || lowerURL.endsWith('.wav') || lowerURL.endsWith('.ogg');
            const isVideo = lowerURL.endsWith('.mp4') || lowerURL.endsWith('.webm') || lowerURL.endsWith('.mov');
            const isPDF = lowerURL.endsWith('.pdf');
            
            // 1. IMAGE EMBED (.png, .jpg, .gif)
            if (isImage) {
                return `
                <div class="mt-4 flex justify-center">
                    <img src="${viewUrl}" alt="Embedded Image" class="max-w-full h-auto rounded-lg shadow-xl" style="max-height: 400px; object-fit: contain;">
                </div>
                `;
            }

            // 2. AUDIO EMBED (.mp3, .wav, .ogg)
            if (isAudio) {
                let mimeType = 'audio/mpeg'; 

                return `
                <div class="mt-4">
                    <audio controls class="w-full bg-gray-950/50 p-3 rounded-lg">
                      <source src="${downloadUrl}" type="${mimeType}">
                      Your browser does not support the audio element. <a href="${downloadUrl}" target="_blank" class="text-indigo-400">Download Audio</a>
                    </audio>
                </div>
                `;
            }
            
            // 3. VIDEO/PDF/DOCUMENT EMBED (using iframe preview)
            if (isVideo || isPDF || lowerURL.includes('document') || lowerURL.includes('spreadsheet') || lowerURL.includes('presentation')) {
                return `
                <div class="mt-4 rounded-lg overflow-hidden shadow-2xl" style="position: relative; padding-bottom: 56.25%; height: 0;">
                    <iframe src="${embedUrl}" 
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
                            frameborder="0" allowfullscreen></iframe>
                </div>
                `;
            }
            
            // 4. GENERIC DOWNLOAD LINK
            return `
                <div class="mt-4">
                    <a href="${downloadUrl}" target="_blank" 
                       class="inline-flex items-center space-x-2 text-indigo-400 hover:text-indigo-300 font-medium py-2 px-4 bg-indigo-900/50 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        <span>Download Google Drive File</span>
                    </a>
                </div>
            `;
        }

        // --- Post Loading ---
        function loadPosts() {
            if (!currentUserId) return; // Not logged in

            // Reference to the 'posts' collection
            const postsColRef = collection(db, "portals/sda-portal/posts");
            const q = query(postsColRef); 

            loadingSpinner.classList.remove('hidden');

            // Listen for real-time updates
            onSnapshot(q, (snapshot) => {
                loadingSpinner.classList.add('hidden');
                
                if (snapshot.empty && postList.innerHTML === '') {
                    postList.innerHTML = '<p class="text-slate-400 text-center">No announcements yet.</p>';
                    return;
                }

                snapshot.docChanges().forEach((change) => {
                    const post = change.doc.data();
                    const postId = change.doc.id;
                    const postElement = createPostElement(post, postId, change.type);
                    
                    if (change.type === "added") {
                        // Remove "no posts" message if it exists
                        const noPostsMsg = postList.querySelector('p');
                        if (noPostsMsg) noPostsMsg.remove();
                        // Add new posts to the top
                        postList.prepend(postElement);
                    }
                    if (change.type === "modified") {
                        // Find and replace the modified post
                        const oldElement = document.getElementById(`post-${postId}`);
                        if (oldElement) {
                            oldElement.replaceWith(postElement);
                        }
                    }
                    if (change.type === "removed") {
                        // Find and remove the post
                        const oldElement = document.getElementById(`post-${postId}`);
                        if (oldElement) {
                            oldElement.remove();
                        }
                    }
                });
            }, (error) => {
                console.error("Error loading posts: ", error);
                statusMessage.textContent = 'Error loading posts. ' + error.message;
                statusMessage.classList.remove('hidden');
            });
        }

        // --- Create Post Element ---
        function createPostElement(post, postId, changeType) {
            const postDiv = document.createElement('div');
            postDiv.id = `post-${postId}`;
            postDiv.className = 'bg-gray-900 border border-slate-800 shadow-xl rounded-lg overflow-hidden';
            
            if (changeType === "added") {
                postDiv.classList.add('new-post-animation');
            }

            const date = post.createdAt ? post.createdAt.toDate().toLocaleString('en-AU') : 'Just now';

            // Check if the database 'likedBy' array includes this user's PORTAL USERNAME
            const hasLiked = post.likedBy && post.likedBy.includes(username);

            // Admin Delete Button
            const deleteButtonHtml = userRole === 'admin' ? `
                <button data-post-id="${postId}" class="delete-post-btn text-slate-500 hover:text-red-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            ` : '';

            // Generate the media/link HTML (Google Drive version)
            const fileLinkHtml = generateEmbedHTML(post.fileURL);

            postDiv.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-slate-400">Posted by ${post.postedBy} on ${date}</p>
                        </div>
                        ${deleteButtonHtml}
                    </div>
                    <p class="text-lg text-slate-100 whitespace-pre-wrap mt-4 mb-5">${post.content}</p>
                    ${fileLinkHtml}
                </div>
                <!-- Footer for Likes -->
                <div class="bg-gray-950/50 border-t border-slate-800 px-6 py-4">
                    <button data-post-id="${postId}" class="like-btn flex items-center space-x-2 text-slate-400 hover:text-red-500 transition-colors ${hasLiked ? 'text-red-500' : ''}">
                        <svg class="w-6 h-6" fill="${hasLiked ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.5l1.318-1.182a4.5 4.5 0 116.364 6.364L12 20.25l-7.682-7.682a4.5 4.5 0 010-6.364z"></path></svg>
                        <span class="font-medium">${post.likesCount || 0}</span>
                    </button>
                </div>
            `;

            // --- Add Event Listeners ---
            const likeBtn = postDiv.querySelector('.like-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', () => handleLike(postId));
            }
            const deleteBtn = postDiv.querySelector('.delete-post-btn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => handleDeletePost(postId));
            }

            return postDiv;
        }

        // --- Post Form Handling ---
        async function handlePostSubmit(e) {
            e.preventDefault();
            if (!currentUserId || userRole !== 'admin') return;

            const content = postContent.value;
            const fileURL = postLink.value; // Get the link from the text input

            if (!content && !fileURL) {
                alert("You must include either text or a Google Drive link.");
                return;
            }
            
            // Optional validation for Google Drive link
            if (fileURL && !getDriveFileId(fileURL)) {
                if (!confirm("The link doesn't look like a standard Google Drive share link (missing 'id=' or '/file/d/'). Are you sure you want to proceed?")) {
                    return;
                }
            }


            statusMessage.textContent = 'Creating post...';
            statusMessage.classList.remove('hidden');

            try {
                // 1. Add post document to Firestore
                const postsColRef = collection(db, "portals/sda-portal/posts");
                await addDoc(postsColRef, {
                    postedBy: username,
                    content: content,
                    createdAt: serverTimestamp(),
                    likesCount: 0,
                    likedBy: [],
                    fileURL: fileURL || null, // Save the link (or null)
                });

                // 2. Reset form and show success
                postForm.reset();
                statusMessage.textContent = 'Post created successfully!';
                setTimeout(() => statusMessage.classList.add('hidden'), 3000);

            } catch (error) {
                console.error("Error creating post:", error);
                statusMessage.textContent = 'Error creating post. ' + error.message;
            }
        }

        // --- Handle Like ---
        async function handleLike(postId) {
            if (!username) {
                console.error("Not logged in, cannot like post.");
                return;
            }
            
            const postRef = doc(db, "portals/sda-portal/posts", postId);

            try {
                const postDoc = await getDoc(postRef);
                if (!postDoc.exists()) {
                    console.error("Post does not exist.");
                    return;
                }
                
                const postData = postDoc.data();
                const likedBy = postData.likedBy || [];
                const hasLiked = likedBy.includes(username);

                if (hasLiked) {
                    // UNLIKE
                    await updateDoc(postRef, {
                        likesCount: increment(-1),
                        // Remove the portal 'username'
                        likedBy: arrayRemove(username)
                    });
                } else {
                    // LIKE
                    await updateDoc(postRef, {
                        likesCount: increment(1),
                        // Add the portal 'username'
                        likedBy: arrayUnion(username)
                    });
                }

            } catch (error) {
                console.error("Error liking post:", error);
                alert("Error updating like: " + error.message);
            }
        }


        // --- Handle Delete Post ---
        async function handleDeletePost(postId) { 
            if (userRole !== 'admin') return;

            if (!confirm("Are you sure you want to delete this post? This action cannot be undone.")) {
                return;
            }

            try {
                const postRef = doc(db, "portals/sda-portal/posts", postId);
                await deleteDoc(postRef);
                console.log("Post deleted from Firestore.");

            } catch (error) {
                console.error("Error deleting post:", error);
                alert("Error deleting post: " + error.message);
            }
        }

        // --- Logout Handler ---
        document.getElementById('logoutButton').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('userRole');
            sessionStorage.removeItem('username');
            // Use replace to prevent back button from logging them back in
            window.location.replace('portal.html'); 
        });

    </script>

    <!-- Header -->
    <header class="bg-gray-950 shadow-md">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://raw.githubusercontent.com/apiiela/sdaproductionswa/main/sdalogo.jpeg" 
                     alt="SDA Logo" 
                     class="h-10 w-10 object-contain"
                     onerror="this.src='https://placehold.co/100x100/000000/white?text=SDA'; this.onerror=null;">
                <span class="text-xl font-bold text-slate-100">SDA Portal</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="welcomeMessage" class="text-slate-300">Welcome...</span>
                <a href="#" id="logoutButton" class="text-sm text-slate-400 hover:text-indigo-400">Logout</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto p-6 max-w-3xl">

        <!-- Admin Post Form -->
        <section id="adminControls" class="hidden mb-10">
            <h2 class="text-2xl font-bold text-white mb-4">Create New Post</h2>
            <form id="postForm" class="bg-gray-900 border border-slate-800 shadow-xl rounded-lg p-6 space-y-4">
                <div>
                    <label for="postContent" class="block text-sm font-medium text-slate-300">Message</label>
                    <textarea id="postContent" rows="4" 
                              class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm text-slate-100 py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
                <div>
                    <label for="postLink" class="block text-sm font-medium text-slate-300">Google Drive Link (Optional)</label>
                    <input type="text" id="postLink" 
                           placeholder="Paste your Google Drive 'Share' link here..."
                           class="mt-1 block w-full bg-slate-800 border border-slate-700 rounded-md shadow-sm text-slate-100 py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                
                <button type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-black focus:ring-indigo-500 transition-colors duration-200">
                    Submit Post
                </button>
            </form>
        </section>

        <!-- Post List -->
        <section>
            <h2 class="text-2xl font-bold text-white mb-6">Announcements</h2>
            
            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="text-center py-10 hidden">
                <svg class="animate-spin h-8 w-8 text-indigo-400 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-slate-400 mt-2">Loading Posts...</p>
            </div>

            <!-- Status Message -->
            <div id="statusMessage" class="hidden text-center text-red-400 py-4 mb-4 bg-red-900/50 rounded-lg" role="alert">
                <!-- Error messages will appear here -->
            </div>

            <!-- List of posts will be injected here by JS -->
            <div id="postList" class="space-y-6">
                <!-- Posts will be generated by JS -->
            </div>
        </section>

    </main>

</body>
</html>
